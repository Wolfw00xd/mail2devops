image:
  repository: your-registry/gmail-parser
  tag: latest
  pullPolicy: IfNotPresent

schedule: "*/5 * * * 1-5"

env:
  CLIENT_ID: ""
  CLIENT_SECRET: ""
  REFRESH_TOKEN: ""
  AZURE_ORG: ""
  AZURE_PROJECT: ""
  AZURE_PAT: ""
  GMAIL_SUBJECT: ""
  GMAIL_FROM: ""
  AREA_PATH: ""
  ITERATION_PATH: ""
  TEAMS_WEBHOOK_URL: ""
  PARENT_TASK: ""

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 128Mi